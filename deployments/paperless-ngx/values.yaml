paperless-ngx:
  image:
    tag: "3.0.2" # renovate: image=ghcr.io/paperless-ngx/paperless-ngx
  env:
    PAPERLESS_SECRET_KEY:
      secretKeyRef:
        name: paperless
        key: secret_key
    PAPERLESS_DBENGINE: postgresql
    PAPERLESS_DBHOST: postgres-rw.databases.svc.cluster.local
    PAPERLESS_DBNAME: paperless
    PAPERLESS_DBUSER: paperless
    PAPERLESS_DBPASS:
      secretKeyRef:
        name: paperless-postgresql
        key: password
    PAPERLESS_REDIS: redis://paperless-ngx-redis
    PAPERLESS_TIKA_ENABLED: "1"
    PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://localhost:3000
    PAPERLESS_TIKA_ENDPOINT: http://localhost:9998
  redis:
    enabled: false
  persistence:
    data:
      enabled: true
      accessMode: ReadWriteOnce
      size: 1Gi
    media:
      enabled: true
      accessMode: ReadWriteOnce
      size: 1Gi
    export:
      enabled: true
      accessMode: ReadWriteOnce
      size: 1Gi
    consume:
      enabled: true
      accessMode: ReadWriteOnce
      size: 1Gi
  ingress:
    main:
      enabled: true
      annotations:
        nginx.org/client-max-body-size: "500m"
      hosts:
        - host: paperless.home.klaus-meyer.net
          paths:
            - path: /
      tls:
        - hosts:
            - paperless.home.klaus-meyer.net
  additionalContainers:
    tika:
      name: "tika"
      image: "docker.io/apache/tika:latest"
    gotenberg:
      name: "gotenberg"
      image: "docker.io/gotenberg/gotenberg:8.34"

redis:
  haMode:
    enabled: false
