whatchy:
  rails-application:
    image:
      tag: master
      pullPolicy: Always
    environment:
      sealedSecrets: true
      plain:
        BANNER_CACHE_HOST: "https://www.thetvdb.com"
        DOMAIN: "whatchy.home.klaus-meyer.net"
        S3_BUCKET: "whatchy-posters"
        S3_ENDPOINT: "https://s3.home.klaus-meyer.net"
        S3_REGION: "de-dahoam-1"
        SMTP_ENABLED: "true"
        SMTP_PORT: "25"
        SMTP_SERVER: "mailcatcher-smtp.mailcatcher.svc.cluster.local"
      secret:
        APPSIGNAL_PUSH_API_KEY: 
        DATABASE_URL: 
        S3_ACCESS_KEY_ID: 
        S3_SECRET_ACCESS_KEY: 
        SECRET_KEY_BASE: 
        SMTP_PASSWORD: 
        SMTP_USERNAME: 
        THETVDB_APIKEY: 
    ingress:
      enabled: true
      hosts:
        - host: whatchy.home.klaus-meyer.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - "whatchy.home.klaus-meyer.net"
