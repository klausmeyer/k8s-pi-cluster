# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json

controllers:
  backend:
    strategy: RollingUpdate
    containers:
      backend:
        image:
          repository: klausmeyer/pantry-backend
          tag: latest
          pullPolicy: Always
        envFrom:
          - configMapRef:
              name: "{{ .Release.Name }}-backend"
          - secretRef:
              name: "{{ .Release.Name }}-backend"
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /healthz
            spec:
              initialDelaySeconds: 10
              periodSeconds: 15
          readiness:
            enabled: true
            type: HTTP
            path: /healthz
            spec:
              initialDelaySeconds: 5
              periodSeconds: 10

  frontend:
    strategy: RollingUpdate
    containers:
      frontend:
        image:
          repository: klausmeyer/pantry-frontend
          tag: latest
          pullPolicy: Always
        env:
          - name: BACKEND_UPSTREAM
            value: "{{ .Release.Name }}-backend:4000"
          - name: OIDC_ISSUER
            value: https://idp.home.klaus-meyer.net/auth/realms/home
          - name: OIDC_CLIENT_ID
            value: pantry
          - name: OIDC_REDIRECT_URI
            value: https://pantry.home.klaus-meyer.net/auth/callback
          - name: OIDC_POST_LOGOUT_REDIRECT_URI
            value: https://pantry.home.klaus-meyer.net/
          - name: OIDC_SCOPE
            value: openid profile email
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /
            spec:
              initialDelaySeconds: 10
              periodSeconds: 15
          readiness:
            enabled: true
            type: HTTP
            path: /
            spec:
              initialDelaySeconds: 5
              periodSeconds: 10

configMaps:
  backend:
    suffix: backend
    data:
      HTTP_ADDR: ":4000"
      DB_HOST: postgres-rw.databases.svc.cluster.local
      DB_PORT: "5432"
      DB_NAME: pantry
      DB_USER: pantry
      DB_SSLMODE: require
      S3_ENDPOINT: https://s3.home.klaus-meyer.net
      S3_REGION: de-dahoam-1
      S3_BUCKET: pantry-pictures
      S3_USE_PATH_STYLE: "false"
      OIDC_ISSUER: https://idp.home.klaus-meyer.net/auth/realms/home

rawResources:
  backend:
    suffix: backend
    manifest:
      apiVersion: bitnami.com/v1alpha1
      kind: SealedSecret
      metadata:
        annotations:
          sealedsecrets.bitnami.com/namespace-wide: "true"
      spec:
        encryptedData:
          DB_PASSWORD: 
          S3_ACCESS_KEY_ID: 
          S3_SECRET_ACCESS_KEY: 
  database-role-secret:
    forceRename: postgres-role-pantry
    manifest:
      apiVersion: bitnami.com/v1alpha1
      kind: SealedSecret
      metadata:
        namespace: databases
        annotations:
          sealedsecrets.bitnami.com/namespace-wide: "true"
        labels:
          cnpg.io/reload: "true"
      spec:
        template:
          type: kubernetes.io/basic-auth
        encryptedData:
          username: 
          password: 
  database-role:
    forceRename: postgres-role-pantry
    manifest:
      apiVersion: postgresql.cnpg.io/v1
      kind: DatabaseRole
      metadata:
        namespace: databases
      spec:
        cluster:
          name: postgres
        name: pantry
        login: true
        passwordSecret:
          name: postgres-role-pantry
  database:
    forceRename: postgres-db-pantry
    manifest:
      apiVersion: postgresql.cnpg.io/v1
      kind: Database
      metadata:
        name: postgres-db-pantry
        namespace: databases
      spec:
        name: pantry
        owner: pantry
        cluster:
          name: postgres

service:
  backend:
    controller: backend
    ports:
      http:
        port: 4000
  frontend:
    controller: frontend
    ports:
      http:
        port: 80

ingress:
  frontend:
    hosts:
      - host: pantry.home.klaus-meyer.net
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: frontend
              port: http
    tls:
      - hosts:
          - pantry.home.klaus-meyer.net
