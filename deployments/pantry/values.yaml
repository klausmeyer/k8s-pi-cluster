pantry:
  backend:
    image:
      pullPolicy: Always
    service:
      type: ClusterIP
      port: 4000
    env:
      HTTP_ADDR: ":4000"
      DB_HOST: "postgres-rw.databases.svc.cluster.local"
      DB_PORT: "5432"
      DB_NAME: "pantry"
      DB_USER: "pantry"
      DB_SSLMODE: "require"
      S3_ENDPOINT: "https://s3.home.klaus-meyer.net"
      S3_REGION: "de-dahoam-1"
      S3_BUCKET: "pantry-pictures"
      S3_USE_PATH_STYLE: "false"
      OIDC_ISSUER: "https://idp.home.klaus-meyer.net/auth/realms/home"
    credentials:
      keys:
        dbPassword: DB_PASSWORD
        s3AccessKeyId: S3_ACCESS_KEY_ID
        s3SecretAccessKey: S3_SECRET_ACCESS_KEY

  sealedSecrets:
    backendCredentials:
      enabled: true
      encryptedData:
        DB_PASSWORD: 
        S3_ACCESS_KEY_ID: 
        S3_SECRET_ACCESS_KEY: 

  frontend:
    image:
      pullPolicy: Always
    env:
      OIDC_ISSUER: "https://idp.home.klaus-meyer.net/auth/realms/home"
      OIDC_CLIENT_ID: "pantry"
      OIDC_REDIRECT_URI: "https://pantry.home.klaus-meyer.net/auth/callback"
      OIDC_POST_LOGOUT_REDIRECT_URI: "https://pantry.home.klaus-meyer.net/"
      OIDC_SCOPE: "openid profile email"

  ingress:
      enabled: true
      className: nginx
      pathType: Prefix
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        cert-manager.io/common-name: "*.home.klaus-meyer.net"
      hosts:
        - host: pantry.home.klaus-meyer.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - "*.home.klaus-meyer.net"
          secretName: tls-wildcard-home-klaus-meyer-net
