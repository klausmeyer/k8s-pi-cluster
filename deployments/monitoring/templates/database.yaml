apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  namespace: databases
  name: postgres-role-grafana
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
  labels:
    cnpg.io/reload: "true"
spec:
  template:
    type: kubernetes.io/basic-auth
  encryptedData:
    username: 
    password: 
---
apiVersion: postgresql.cnpg.io/v1
kind: DatabaseRole
metadata:
  namespace: databases
  name: postgres-role-grafana
spec:
  cluster:
    name: postgres
  name: grafana
  login: true
  passwordSecret:
    name: postgres-role-grafana
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: postgres-db-grafana
  namespace: databases
spec:
  name: grafana
  owner: grafana
  cluster:
    name: postgres
