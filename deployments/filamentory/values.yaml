# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json

controllers:
  main:
    strategy: RollingUpdate
    containers:
      main:
        image:
          repository: klausmeyer/filamentory
          tag: master
          pullPolicy: Always
        envFrom:
          - configMapRef:
              name: "{{ .Release.Name }}"
          - secretRef:
              name: "{{ .Release.Name }}"
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /up
          readiness:
            enabled: true
            type: HTTP
            path: /up
          startup:
            enabled: true
            type: HTTP
            path: /up

configMaps:
  main:
    data:
      APPSIGNAL_IGNORE_ACTIONS: "Rails::HealthController#show"

rawResources:
  filamentory:
    manifest:
      apiVersion: bitnami.com/v1alpha1
      kind: SealedSecret
      metadata:
        annotations:
          sealedsecrets.bitnami.com/namespace-wide: "true"
      spec:
        encryptedData:
          APPSIGNAL_PUSH_API_KEY: 
          DATABASE_URL: 
          SECRET_KEY_BASE: 
  database-role-secret:
    forceRename: postgres-role-filamentory
    manifest:
      apiVersion: bitnami.com/v1alpha1
      kind: SealedSecret
      metadata:
        namespace: databases
        annotations:
          sealedsecrets.bitnami.com/namespace-wide: "true"
        labels:
          cnpg.io/reload: "true"
      spec:
        template:
          type: kubernetes.io/basic-auth
        encryptedData:
          username: 
          password: 
  database-role:
    forceRename: postgres-role-filamentory
    manifest:
      apiVersion: postgresql.cnpg.io/v1
      kind: DatabaseRole
      metadata:
        namespace: databases
      spec:
        cluster:
          name: postgres
        name: filamentory
        login: true
        passwordSecret:
          name: postgres-role-filamentory
  database:
    forceRename: postgres-db-filamentory
    manifest:
      apiVersion: postgresql.cnpg.io/v1
      kind: Database
      metadata:
        name: postgres-db-filamentory
        namespace: databases
      spec:
        name: filamentory
        owner: filamentory
        cluster:
          name: postgres

service:
  main:
    controller: main
    ports:
      http:
        port: 80

ingress:
  main:
    hosts:
      - host: filamentory.home.klaus-meyer.net
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - hosts: ["filamentory.home.klaus-meyer.net"]
