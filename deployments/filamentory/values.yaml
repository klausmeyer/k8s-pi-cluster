rails-application:
  name: filamentory
  image:
    repository: klausmeyer/filamentory
    tag: master
    pullPolicy: Always
  environment:
    sealedSecrets: true
    plain:
      DUMMY: "true"
      APPSIGNAL_IGNORE_ACTIONS: "Rails::HealthController#show"
    secret:
      APPSIGNAL_PUSH_API_KEY: 
      DATABASE_URL: 
      SECRET_KEY_BASE: 
  deployments:
    web:
      livenessProbe:
        httpGet:
          path: /up
      readinessProbe:
        httpGet:
          path: /up
  ingress:
    enabled: true
    hosts:
      - host: filamentory.home.klaus-meyer.net
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - filamentory.home.klaus-meyer.net
