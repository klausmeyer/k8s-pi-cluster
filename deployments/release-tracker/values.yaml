release-tracker:
  rails-application:
    image:
      tag: master
      pullPolicy: Always
    environment:
      sealedSecrets: true
      plain:
        APPSIGNAL_APP_NAME: Release Tracker
      secret:
        APPSIGNAL_PUSH_API_KEY: 
        DATABASE_URL: 
        GITHUB_TOKEN: 
        SECRET_KEY_BASE: 
        WEBHOOK_DISCORD_URL: 
    ingress:
      enabled: true
      hosts:
        - host: releases.home.klaus-meyer.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - releases.home.klaus-meyer.net
