# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-5.0.1/charts/library/common/values.schema.json

controllers:
  pg-backup:
    type: cronjob
    suffix: pg-backup
    cronjob:
      schedule: "0 22 * * *"
    containers:
      main:
        image:
          repository: klausmeyer/pg-backup
          tag: latest
          pullPolicy: Always
        envFrom:
          - configMapRef:
              name: "{{ .Release.Name }}-pg-backup"
          - secretRef:
              name: "{{ .Release.Name }}-pg-backup"
        securityContext:
          privileged: true
          capabilities:
            add:
              - SYS_ADMIN

persistence:
  pg-backup-hooks:
    type: configMap
    identifier: pg-backup-hooks
    globalMounts:
      - path: /opt/pg-backup/hooks

configMaps:
  pg-backup:
    data:
      DB_HOST: postgres-rw.databases.svc.cluster.local
      DB_PORT: "5432"
      DATABASES: filamentory,gitea,grafana,keycloak,pantry,paperless,planka,release-tracker,whatchy
  pg-backup-hooks:
    data:
      before-backup: |
        curl -sX POST "https://appsignal-endpoint.net/check_ins/cron?api_key=${AIRBRAKE_API_KEY}&identifier=pg-backup&kind=Start"
      after-backup: |
        curl -sX POST "https://appsignal-endpoint.net/check_ins/cron?api_key=${AIRBRAKE_API_KEY}&identifier=pg-backup"

rawResources:
  pg-backup:
    manifest:
      apiVersion: bitnami.com/v1alpha1
      kind: SealedSecret
      metadata:
        annotations:
          sealedsecrets.bitnami.com/namespace-wide: "true"
      spec:
        encryptedData:
          DB_USER: 
          DB_PASS: 
          WEBDAV_HOST: 
          WEBDAV_USER: 
          WEBDAV_PASS: 
          WEBDAV_BASE: 
          AIRBRAKE_API_KEY: 
  database-superuser-secret:
    forceRename: postgres-role-postgres
    manifest:
      apiVersion: bitnami.com/v1alpha1
      kind: SealedSecret
      metadata:
        annotations:
          sealedsecrets.bitnami.com/namespace-wide: "true"
      spec:
        template:
          type: kubernetes.io/basic-auth
        encryptedData:
          username: 
          password: 
  database-role-secret:
    forceRename: postgres-role-backup
    manifest:
      apiVersion: bitnami.com/v1alpha1
      kind: SealedSecret
      metadata:
        annotations:
          sealedsecrets.bitnami.com/namespace-wide: "true"
      spec:
        template:
          type: kubernetes.io/basic-auth
        encryptedData:
          username: 
          password: 

cluster:
  fullnameOverride: "postgres"
  version:
    postgresql: "18.4"
  cluster:
    superuserSecret: postgres-role-postgres
    roles:
      - login: true
        name: backup
        passwordSecret:
          name: postgres-backup
        inRoles:
          - pg_read_all_data
