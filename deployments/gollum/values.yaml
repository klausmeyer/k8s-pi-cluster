controllers:
  gollum:
    enabled: true
    type: deployment
    defaultContainerOptions:
      image:
        repository: gollumwiki/gollum
        tag: 6.1.0
    containers:
      gollum:
        enabled: true
    pod:
      securityContext:
        fsGroup: 1000
service:
  gollum:
    enabled: true
    nameOverride: http
    controller: gollum
    primary: true
    ports:
      http:
        enabled: true
        primary: true
        port: 80
        protocol: HTTP
        targetPort: 4567
persistence:
  data:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1G
    # retain: true
    globalMounts:
      - path: /wiki

oauth2-proxy:
  fullnameOverride: "oauth2-proxy"

  config:
    existingSecret: oauth2-proxy
    configFile: |-
      email_domains = [ "*" ]
      upstreams = [ "http://gollum" ]
      provider = "keycloak-oidc"
      oidc_issuer_url = "https://idp.home.klaus-meyer.net/auth/realms/home"
      code_challenge_method = "S256"

  ingress:
    enabled: true
    hosts:
      - wiki.home.klaus-meyer.net
    tls:
      - hosts:
          - wiki.home.klaus-meyer.net
